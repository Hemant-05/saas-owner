name: restaurant_owner_app
description: QR Cafe — Restaurant Owner Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP client
  http: ^1.2.1

  # Local storage
  shared_preferences: ^2.5.5

  # WebSocket / Socket.io
  socket_io_client: ^2.0.3+1

  # QR code display
  qr_flutter: ^4.1.0

  # Image loading with cache
  cached_network_image: ^3.3.1

  # Image picking
  image_picker: ^1.1.2

  # Local notifications (new orders)
  flutter_local_notifications: ^17.2.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1

  # Utilities
  intl: ^0.19.0
  timeago: ^3.6.1
  printing: ^5.14.3
  pdf: ^3.12.0
  connectivity_plus: ^7.1.1
  fl_chart: ^1.2.0
  google_fonts: ^8.1.0
  audioplayers: ^6.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
